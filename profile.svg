<svg width="740" height="280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#101820"/>
    </linearGradient>
    <linearGradient id="pborder" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#21262d"/>
      <stop offset="50%" stop-color="#30363d"/>
      <stop offset="100%" stop-color="#21262d"/>
    </linearGradient>
  </defs>

  <style>
    text { font-family: 'SF Mono','Cascadia Code','JetBrains Mono','Fira Code',Consolas,monospace; }
  </style>

  <!-- Background -->
  <rect width="740" height="280" rx="8" fill="url(#pbg)"/>
  <rect x="0.5" y="0.5" width="739" height="279" rx="8" fill="none" stroke="url(#pborder)" stroke-width="1"/>

  <!-- ASCII frame (subtle) -->
  <text x="20" y="30" font-size="12" fill="#21262d">╔══════════════════════════════════════════════════════════════════════════════════╗</text>
  <text x="20" y="258" font-size="12" fill="#21262d">╚══════════════════════════════════════════════════════════════════════════════════╝</text>

  <!-- Negation line -->
  <text x="40" y="58" font-size="13" fill="#f85149">✗</text>
  <text x="56" y="58" font-size="13" fill="#484f58" text-decoration="line-through">Build AI models</text>
  <text x="230" y="58" font-size="13" fill="#f85149">✗</text>
  <text x="246" y="58" font-size="13" fill="#484f58" text-decoration="line-through">Write prompts</text>
  <text x="400" y="58" font-size="13" fill="#f85149">✗</text>
  <text x="416" y="58" font-size="13" fill="#484f58" text-decoration="line-through">Fine-tune LLMs</text>

  <!-- Core statement -->
  <text x="40" y="96" font-size="14" fill="#e6edf3" font-weight="600">I build the missing infrastructure between AI models</text>
  <text x="40" y="116" font-size="14" fill="#e6edf3" font-weight="600">and real-world tasks.</text>
  <text x="260" y="116" font-size="14" fill="#8b949e">The layer underneath —</text>

  <!-- Capability items -->
  <text x="56" y="150" font-size="13" fill="#3fb950">→</text>
  <text x="76" y="150" font-size="13" fill="#58a6ff">execution engines</text>
  <text x="270" y="150" font-size="13" fill="#8b949e">run structured tasks, not vibes</text>

  <text x="56" y="172" font-size="13" fill="#3fb950">→</text>
  <text x="76" y="172" font-size="13" fill="#d2a8ff">persistent memory</text>
  <text x="270" y="172" font-size="13" fill="#8b949e">agents that remember across sessions</text>

  <text x="56" y="194" font-size="13" fill="#3fb950">→</text>
  <text x="76" y="194" font-size="13" fill="#ffa657">structured debugging</text>
  <text x="270" y="194" font-size="13" fill="#8b949e">diagnose, not guess</text>

  <text x="56" y="216" font-size="13" fill="#3fb950">→</text>
  <text x="76" y="216" font-size="13" fill="#ff7b72">system awareness</text>
  <text x="270" y="216" font-size="13" fill="#8b949e">know when to build, when to back off</text>

  <!-- Footer info -->
  <text x="40" y="246" font-size="12" fill="#484f58">Background :</text>
  <text x="160" y="246" font-size="12" fill="#8b949e">OS kernels in Rust · cross-platform apps · dev tools</text>
</svg>
